# ─────────────────────────────────────────────────────────────
# 发版 + 自动更新产物发布（Windows + macOS 双平台）
# 打一个 v* 标签（如 v0.2.11）推上来，就会在 Windows / macOS runner 上分别构建、
# 用更新私钥（minisign）签名，并把安装包 + .sig + latest.json 上传到同一个 GitHub Release。
# 应用端从 releases/latest/download/latest.json 检查更新，对上 pubkey 即可自动升级。
#
#   Windows → NSIS 安装包 (_<ver>_x64-setup.exe) + .sig
#   macOS   → .dmg 安装包 + .app.tar.gz(更新包) + .sig，分 Apple Silicon / Intel 两个架构
#
# 需要在仓库 Settings → Secrets and variables → Actions 配置：
#   TAURI_SIGNING_PRIVATE_KEY           = 更新私钥文件全文（单行）
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  = 私钥密码
#   POLARIS_GIFT_MINIMAX_KEY            = 「粉丝福利」MiniMax key（构建期注入，build.rs 混淆进二进制）
#
# 说明：macOS 产物未经 Apple 签名/公证（无 Apple Developer 证书），
#       首次打开需右键「打开」或 `xattr -cr /Applications/高智愿.app` 放行 Gatekeeper。
#       这不影响 Tauri 自身的 minisign 更新签名与自动更新链路。
# ─────────────────────────────────────────────────────────────
name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"      # Apple Silicon (M 系列)
            args: "--target aarch64-apple-darwin --bundles app,dmg"
            rust_targets: "aarch64-apple-darwin"
          - platform: "macos-latest"      # Intel Mac
            args: "--target x86_64-apple-darwin --bundles app,dmg"
            rust_targets: "x86_64-apple-darwin"
          - platform: "windows-latest"    # Windows x64
            args: "--bundles nsis"
            rust_targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm install

      - name: Build, sign & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # 「粉丝福利」MiniMax key：构建期注入，build.rs XOR 混淆进二进制，公开源码里无明文。
          POLARIS_GIFT_MINIMAX_KEY: ${{ secrets.POLARIS_GIFT_MINIMAX_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Polaris ${{ github.ref_name }}"
          releaseBody: "查看 CHANGELOG 或提交记录了解本次更新内容。"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # ───────────────────────────────────────────────────────────
  # 汇总 latest.json（自动更新清单）
  # 矩阵里三个 job 并行上传时会互相清掉对方的 latest.json（tauri-action 已知坑），
  # 结果 releases/latest/download/latest.json 404、自动更新失效。
  # 这里在三平台构建全部完成后，从各自的 .sig 重建一份合并清单，覆盖上传，保证自愈。
  # ───────────────────────────────────────────────────────────
  updater-manifest:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Rebuild & upload merged latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VER="${TAG#v}"
          DIR="$(mktemp -d)"
          gh release download "$TAG" -R "$REPO" -p '*.sig' -D "$DIR"
          base="https://github.com/$REPO/releases/download/$TAG"

          arm_sig_file=$(ls "$DIR"/*aarch64.app.tar.gz.sig)
          x64_sig_file=$(ls "$DIR"/*_x64.app.tar.gz.sig)
          win_sig_file=$(ls "$DIR"/*-setup.exe.sig)

          arm_name="$(basename "${arm_sig_file%.sig}")"
          x64_name="$(basename "${x64_sig_file%.sig}")"
          win_name="$(basename "${win_sig_file%.sig}")"

          jq -n \
            --arg ver "$VER" \
            --arg pd  "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg as  "$(cat "$arm_sig_file")" --arg au "$base/$arm_name" \
            --arg xs  "$(cat "$x64_sig_file")" --arg xu "$base/$x64_name" \
            --arg ws  "$(cat "$win_sig_file")" --arg wu "$base/$win_name" \
            '{version:$ver, notes:("高智愿 " + $ver + " 自动更新"), pub_date:$pd,
              platforms:{
                "darwin-aarch64":{signature:$as,url:$au},
                "darwin-x86_64":{signature:$xs,url:$xu},
                "windows-x86_64":{signature:$ws,url:$wu}}}' > latest.json

          cat latest.json
          gh release upload "$TAG" -R "$REPO" latest.json --clobber
