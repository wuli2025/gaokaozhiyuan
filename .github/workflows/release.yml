# ─────────────────────────────────────────────────────────────
# 发版 + 自动更新产物发布
# 打一个 v* 标签（如 v0.2.7）推上来，就会在 Windows runner 上构建、
# 用更新私钥签名，并把 NSIS 安装包 + .sig + latest.json 上传到 GitHub Release。
# 应用端从 releases/latest/download/latest.json 检查更新，对上 pubkey 即可自动升级。
#
# 需要在仓库 Settings → Secrets and variables → Actions 配置：
#   TAURI_SIGNING_PRIVATE_KEY           = 私钥文件全文（D:\polaris\polaris-updater-private.key 的内容，单行无换行）
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  = 私钥密码（polaris2026）
#   POLARIS_GIFT_MINIMAX_KEY            = 「粉丝福利」MiniMax key（构建期注入，build.rs 混淆进二进制）
# ─────────────────────────────────────────────────────────────
name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm install

      - name: Build, sign & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # 「粉丝福利」MiniMax key：构建期注入，build.rs XOR 混淆进二进制，公开源码里无明文。
          POLARIS_GIFT_MINIMAX_KEY: ${{ secrets.POLARIS_GIFT_MINIMAX_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Polaris ${{ github.ref_name }}"
          releaseBody: "查看 CHANGELOG 或提交记录了解本次更新内容。"
          releaseDraft: false
          prerelease: false
